<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction Result</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

.result-box{

width:600px;

margin:80px auto;

background:white;

padding:50px;

border-radius:20px;

box-shadow:0px 15px 30px rgba(0,0,0,.2);

text-align:center;

}

.result-box i{

font-size:80px;

margin-bottom:20px;

}

.approved{

color:#28a745;

}

.rejected{

color:#dc3545;

}

.home-btn{

display:inline-block;

margin-top:25px;

padding:14px 35px;

background:#007bff;

color:white;

text-decoration:none;

border-radius:10px;

font-size:18px;

}

.home-btn:hover{

background:#0056b3;

}

</style>

</head>

<body>

<div class="navbar">

<h2>

<i class="fa-solid fa-credit-card"></i>

CreditAI

</h2>

</div>

<div class="result-box">

{% if "Approved" in prediction %}

<i class="fa-solid fa-circle-check approved"></i>

<h1 class="approved">

Congratulations!

</h1>

<h2>

{{ prediction }}

</h2>

<p>

The applicant is eligible for the credit card.

</p>

{% else %}

<i class="fa-solid fa-circle-xmark rejected"></i>

<h1 class="rejected">

Application Rejected

</h1>

<h2>

{{ prediction }}

</h2>

<p>

The applicant is currently not eligible for the credit card.

</p>

{% endif %}

<a href="/predict" class="home-btn">

Predict Again

</a>

</div>

</body>

</html>
